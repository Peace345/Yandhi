<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yandhi</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
    }

    #player {
      padding: 20px;
    }

    #cover {
      width: 250px;
      height: 250px;
      object-fit: cover;
      margin-top: 10px;
      border-radius: 10px;
    }

    .song {
      padding: 10px;
      margin: 5px auto;
      width: 60%;
      background: #222;
      cursor: pointer;
      border-radius: 5px;
    }

    .song:hover {
      background: #333;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="player">

  <!-- BACK BUTTON -->
  <button onclick="goBack()">⬅ Back to Library</button>

  <!-- ALBUM INFO -->
  <h1 id="albumTitle">Album Title</h1>
  <img id="cover" src="" alt="cover">

  <!-- SONG LIST -->
  <div id="songs"></div>

</div>

<audio id="audio"></audio>

<button id="playPauseBtn" onclick="togglePlay()">▶️ Play</button>

<script>

let currentAlbum = {
  name: "Yandhi",
  cover: "yandhicover.jpg",
  songs: [
      { file: "selah.mp3", title: "Selah", artist: "Kanye West" },
      { file: "chakras.mp3", title: "Chakras", artist: "Kanye West, The-Dream, Ant Clemons" },
      { file: "thestorm.mp3", title: "The Storm", artist: "Kanye West, Ty Dolla $ign, Kid Cudi, XXXTENTACION" },
      { file: "80degrees.mp3", title: "80 Degrees", artist: "Kanye West, Ant Clemons" },
      { file: "newbody.mp3", title: "New Body", artist: "Kanye West, Nicki Minaj, Ty Dolla $ign" },
      { file: "cityinthesky.mp3", title: "City In The Sky", artist: "Kanye West, Desiigner, Jeremih, Kid Cudi, The-Dream, Ty Dolla $ign, 070 Shake" },
      { file: "alien.mp3", title: "Alien", artist: "Kanye West, Quavo, Kid Cudi, Young Thug, Ant Clemons" },
      { file: "lawofattraction.mp3", title: "Law Of Attraction", artist: "Kanye West, Ant Clemons, Clipse, Kenny G" },
      { file: "ongod.mp3", title: "On God", artist: "Kanye West, Dua Lipa" }
  ]
};

// BACK BUTTON (PUT MAIN REPO LINK HERE)
function goBack() {
  window.location.href = "https://peace345.github.io/Ye-Unreleased-Archive/"; // <-- paste main library repo URL here
}

// LOAD ALBUM
document.getElementById("albumTitle").innerText = currentAlbum.name;
document.getElementById("cover").src = currentAlbum.cover;

buildSongs();

// BUILD SONG LIST
function buildSongs() {
  const songsDiv = document.getElementById("songs");
  songsDiv.innerHTML = "";

  currentAlbum.songs.forEach((song, i) => {
    const div = document.createElement("div");
    div.className = "song";

    div.innerHTML = `
      <strong>${song.title}</strong><br>
      <small>${song.artist || ""}</small>
    `;

    div.onclick = () => playSong(i);

    songsDiv.appendChild(div);
  });
}

// PLAY SONG
function playSong(i) {
  currentIndex = i;

  const song = currentAlbum.songs[i];
  const audio = document.getElementById("audio");

  audio.addEventListener("ended", () => {
  if (currentIndex < currentAlbum.songs.length - 1) {
    playSong(currentIndex + 1);
  } else {
    playSong(0);
  }
});

  audio.src = song.file;
  audio.play();

  updateMediaSession(song, currentAlbum);
}
  
function updateMediaSession(song) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.title,
    artist: song.artist,
    album: currentAlbum.name,
    artwork: [
      { src: currentAlbum.cover, sizes: "512x512", type: "image/jpg" }
    ]
  });

  navigator.mediaSession.setActionHandler("play", () => {
    audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

  navigator.mediaSession.setActionHandler("previoustrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex - 1 + currentAlbum.songs.length) % currentAlbum.songs.length;
    playSong(currentIndex);
  });

  navigator.mediaSession.setActionHandler("nexttrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex + 1) % currentAlbum.songs.length;
    playSong(currentIndex);
  });
}

  if ("mediaSession" in navigator) {

  navigator.mediaSession.setActionHandler("play", async () => {
    await audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

}

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

  audio.addEventListener("play", () => {
  document.getElementById("playPauseBtn").innerText = "⏸️ Pause";
});

audio.addEventListener("pause", () => {
  document.getElementById("playPauseBtn").innerText = "▶️ Play";
});
  
</script>

</body>
</html>
