}

    /* PLAYER */

      padding: 20px;
    }

    .cover {
      width: 220px;
      border-radius: 12px;
    }

    .song {
      margin: 10px 0;
      cursor: pointer;
      opacity: 0.7;
    }

    .song:hover {
      opacity: 1;
    }

    .active {
      opacity: 1;
      text-decoration: underline;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
      background: #1f1f1f;
      border: none;
      border-radius: 6px;
      color: white;
    }

    .nowPlaying {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      padding: 10px;
      font-size: 13px;
      text-align: center;
    }

  }
  </style>
</head>

// --------------------
// BUILD 
// --------------------
 function buildSongs() {
  const songsDiv = document.getElementById("songs");

  if (!songsDiv || !currentAlbum) return;

  songsDiv.innerHTML = "";

  currentAlbum.songs.forEach((song, i) => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song.title;

    div.onclick = () => playSong(i);

    songsDiv.appendChild(div);
  });
}
// --------------------
// OPEN ALBUM (NO AUTO PLAY)
// --------------------
function openAlbum(i) {
  currentAlbum = albums[i];

  library.style.display = "none";
  player.style.display = "block";

  document.getElementById("albumTitle").innerText = currentAlbum.name;
  document.getElementById("cover").src = currentAlbum.cover;

  buildSongs();
}
// --------------------
// BUILD SONG LIST
// --------------------
function buildSongs() {
  const songsDiv = document.getElementById("songs");
  songsDiv.innerHTML = "";

  currentAlbum.songs.forEach((song, i) => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song.title;

    div.onclick = () => playSong(i);
    songsDiv.appendChild(div);
  });
}

// --------------------
// PLAY SONG
// --------------------
 function playSong(index) {
  const song = currentAlbum.songs[index];

  if (!song) return;

  audio.src = song.file;

  document.getElementById("title").innerText = song.title;
  document.getElementById("artist").innerText = song.artist;

  audio.play();

  updateMediaSession(song);
}
// --------------------
// HIGHLIGHT SONG
// --------------------
function highlight(i) {
  const songs = document.querySelectorAll(".song");
  songs.forEach(s => s.classList.remove("active"));
  if (songs[i]) songs[i].classList.add("active");
}

// --------------------
// NEXT SONG (AUTO)
// --------------------
audio.addEventListener("ended", () => {
  if (shuffleMode) {
    shufflePlay();
  } else {
    if (!currentAlbum) return;

    currentIndex = (currentIndex + 1) % currentAlbum.songs.length;
    playSong(currentIndex);
  }
});

  function toggleShuffle() {
  shuffleMode = !shuffleMode;

  if (shuffleMode) {
    shufflePlay();
  }
}

// --------------------
// BACK TO LIBRARY
// --------------------
function goBack() {
  player.style.display = "none";
  library.style.display = "grid";
  audio.pause();
  nowPlaying.innerText = "Nothing playing";
}
  function updateMediaSession(song) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.title,
    artist: song.artist,
    album: currentAlbum.name,
    artwork: [
      { src: currentAlbum.cover, sizes: "512x512", type: "image/jpg" }
    ]
  });

  navigator.mediaSession.setActionHandler("play", () => {
    audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

  navigator.mediaSession.setActionHandler("previoustrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex - 1 + currentAlbum.songs.length) % currentAlbum.songs.length;
    playSong(currentIndex);
  });

  navigator.mediaSession.setActionHandler("nexttrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex + 1) % currentAlbum.songs.length;
    playSong(currentIndex);
  });
}

  function getAllSongs() {
  let allSongs = [];

  albums.forEach(album => {
    album.songs.forEach(song => {
      allSongs.push({
        ...song,
        albumName: album.name
      });
    });
  });

  return allSongs;
}

function shufflePlay() {
  const allSongs = getAllSongs();

  const randomIndex = Math.floor(Math.random() * allSongs.length);
  const song = allSongs[randomIndex];

  currentAlbum = albums.find(a => a.name === song.albumName);
  currentIndex = currentAlbum.songs.findIndex(s => s.file === song.file);

  audio.src = song.file;
  document.getElementById("title").innerText = song.title;
  document.getElementById("artist").innerText = song.artist;

  audio.play();

  updateMediaSession(song);
}

  function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

function back10() {
  audio.currentTime = Math.max(0, audio.currentTime - 10);
}

function forward10() {
  audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
}

function updateLibraryStats() {
  let totalSongs = 0;

  albums.forEach(album => {
    totalSongs += album.songs.length;
  });

  const stats = document.getElementById("libraryStats");
  if (!stats) return;

  stats.innerText = `${albums.length} Albums • ${totalSongs} Songs`;
}

updateLibraryStats();

function buildAlbums() {
  const library = document.getElementById("library");

  if (!library) return;

  library.innerHTML = "";

  albums.forEach((album, i) => {
    const div = document.createElement("div");
    div.className = "album";

    div.innerHTML = `
      <img src="${album.cover}">
      <div class="album-title">${album.name}</div>
    `;

    div.onclick = () => openAlbum(i);

    library.appendChild(div);
  });
}

window.addEventListener("DOMContentLoaded", () => {
  buildAlbums();
});
